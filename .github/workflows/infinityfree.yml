name: Deploy to InfinityFree

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- PHP ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, openssl, pdo, bcmath

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      # ---------- Node / Build ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Frontend
        run: |
          npm ci
          npm run build

      # ---------- Prepare Deployment ----------
      - name: Prepare deployment package
        run: |
          # If this is a push we can detect changed files between before and sha.
          # For manual dispatch keep the step.
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

            if [ -z "$CHANGED" ]; then
              echo "No changes in this push — skipping prepare step."
              exit 0
            fi

            echo "Files changed; running prepare step..."
          fi

          # Only run caches/optimizations if needed (safe to run anyway)
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          # Generate app key only if missing
          if [ ! -f .env ]; then
            echo "No .env file found — copying example."
            cp .env.example .env
          else
            echo ".env already exists — not overwriting."
          fi

          if ! grep -q '^APP_KEY=' .env || grep -q '^APP_KEY=$' .env; then
            php artisan key:generate --force
          else
            echo "APP_KEY present — skipping key generation."
          fi

          # Clean up dev files
          rm -rf node_modules
          rm -rf tests

          # Clear logs
          rm -rf storage/logs/*.log

      # ---------- FTP Upload ----------
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
          log-level: standard
