name: Deploy to InfinityFree

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, openssl, pdo, bcmath

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Prepare Laravel for production
        run: |
          # Ensure .env exists (don't overwrite if it exists)
          [ ! -f .env ] && cp .env.example .env

          # Generate APP_KEY if missing
          grep -q '^APP_KEY=.\+' .env || php artisan key:generate --force

          # Create storage directory structure for InfinityFree
          mkdir -p public/storage/app/public
          chmod -R 755 public/storage

          # Cache configurations
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Cleanup unnecessary files
        run: |
          rm -rf node_modules tests .git .github
          rm -f .gitignore .gitattributes .editorconfig phpunit.xml
          find storage/logs -type f -name "*.log" -delete

      - name: Deploy to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env.example
            **/phpunit.xml
            **/README.md
