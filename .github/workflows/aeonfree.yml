name: Deploy to AeonFree

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step to check if we've done the “prepare” before
      - name: Download marker artifact (if exists)
        uses: actions/download-artifact@v3
        with:
          name: deploy-marker
        continue-on-error: true
        id: download_marker

      - name: Prepare deployment package (only once)
        if: steps.download_marker.outcome == 'failure'
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan storage:link
          rm -rf node_modules
          rm -rf tests
          rm -rf storage/logs/*.log

      # Create marker to mark that “prepare” has run
      - name: Create deploy marker
        if: steps.download_marker.outcome == 'failure'
        run: echo "prepared" > deploy_prepared
      - name: Upload marker artifact
        if: steps.download_marker.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-marker
          path: deploy_prepared

      # ---------- PHP Setup ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, openssl, pdo, bcmath

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      # ---------- Node / Build ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Frontend
        run: |
          npm ci
          npm run build

      # ---------- FTP Upload ----------
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
          log-level: standard
